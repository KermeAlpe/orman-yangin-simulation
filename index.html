<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orman Simülasyon Sistemi - 15 Şekil</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-dark: #1a3a2e;
            --forest-green: #2d5f3f;
            --leaf-green: #4a7c59;
            --bark-brown: #8b4513;
            --earth-brown: #5c4033;
            --sky-blue: #87ceeb;
            --accent-amber: #d4a574;
            --text-cream: #f5f5dc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: var(--text-cream);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            animation: fadeIn 1s ease-out 0.3s backwards;
            align-items: start;
        }

        .controls-panel {
            background: rgba(26, 58, 46, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid rgba(212, 165, 116, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            max-height: calc(100vh - 4rem);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-amber) rgba(45, 95, 63, 0.3);
        }

        .controls-panel::-webkit-scrollbar {
            width: 8px;
        }

        .controls-panel::-webkit-scrollbar-track {
            background: rgba(45, 95, 63, 0.3);
            border-radius: 10px;
        }

        .controls-panel::-webkit-scrollbar-thumb {
            background: var(--accent-amber);
            border-radius: 10px;
        }

        .controls-panel::-webkit-scrollbar-thumb:hover {
            background: #c99159;
        }

        .control-group {
            margin-bottom: 1.5rem;
            animation: slideInLeft 0.6s ease-out backwards;
        }

        .control-label {
            font-family: 'Crimson Pro', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-amber);
            margin-bottom: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-density {
            font-size: 0.9rem;
            padding: 0.3rem 0.8rem;
            background: rgba(212, 165, 116, 0.2);
            border-radius: 8px;
            font-weight: 500;
        }

        .total-density.warning {
            background: rgba(255, 100, 100, 0.3);
            color: #ffaaaa;
        }

        .wind-overlay {
            background: rgba(26, 58, 46, 0.9);
            backdrop-filter: blur(10px);
            padding: 1.2rem;
            border-radius: 12px;
            border: 2px solid rgba(212, 165, 116, 0.4);
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .top-controls {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
        }

        .wind-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: -15px;
        }

        .wind-section-label {
            font-size: 0.85rem;
            color: var(--text-cream);
            font-weight: 600;
            opacity: 0.9;
        }

        .wind-compass {
            width: 80px;
            height: 80px;
            background: rgba(45, 95, 63, 0.4);
            border-radius: 50%;
            position: relative;
            border: 2px solid rgba(212, 165, 116, 0.5);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wind-compass:hover {
            background: rgba(45, 95, 63, 0.6);
            border-color: var(--accent-amber);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.4);
        }

        .wind-arrow {
            color: var(--accent-amber);
            transition: transform 0.3s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(180deg);
        }

        .wind-speed-slider-container {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        #windSpeedSlider {
            width: 150px;
            height: 8px;
        }

        .wind-speed-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-amber);
            min-width: 30px;
            text-align: center;
        }

        .generate-btn-top {
            background: linear-gradient(135deg, var(--accent-amber) 0%, #c49563 100%);
            color: var(--forest-dark);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.3);
            font-family: 'Crimson Pro', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }

        .graph-btn {
            background: rgba(26, 58, 46, 0.6);
            border: 2px solid var(--accent-amber);
            color: var(--accent-amber);
            padding: 0.6rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Crimson Pro', serif;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .graph-btn:hover {
            background: var(--accent-amber);
            color: var(--forest-dark);
            transform: translateY(-2px);
        }

        .slider-container {
            position: relative;
            margin-top: 1rem;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--forest-green), var(--leaf-green));
            border-radius: 5px;
            outline: none;
            opacity: 0.9;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        input[type="range"]:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            background: var(--accent-amber);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .value-display {
            display: inline-block;
            background: rgba(212, 165, 116, 0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-weight: 600;
            color: var(--accent-amber);
            margin-left: 0.5rem;
            min-width: 70px;
            text-align: center;
        }

        .geometry-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.6rem;
            margin-top: 1rem;
        }

        .geometry-btn {
            background: rgba(45, 95, 63, 0.5);
            border: 2px solid rgba(212, 165, 116, 0.3);
            color: var(--text-cream);
            padding: 0.6rem 0.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1.2;
            font-size: 0.8rem;
        }

        .geometry-icon {
            font-size: 1.5rem;
            line-height: 1;
            margin-bottom: 0.2rem;
            display: block;
        }
        
        .geo-name {
            font-size: 0.7rem;
            font-weight: 600;
            opacity: 0.9;
        }

        .geometry-btn:hover {
            background: rgba(45, 95, 63, 0.8);
            border-color: var(--accent-amber);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 165, 116, 0.2);
        }

        .geometry-btn.active {
            background: var(--leaf-green);
            border-color: var(--accent-amber);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
        }

        .tree-species {
            margin-top: 1rem;
        }

        .species-item {
            background: rgba(45, 95, 63, 0.3);
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 0.8rem;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }

        .species-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .species-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent-amber);
        }

        .species-name {
            font-weight: 600;
            flex: 1;
        }

        .density-control {
            margin-left: 28px;
        }

        .density-label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 0.3rem;
        }

        .season-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .season-btn {
            background: rgba(45, 95, 63, 0.5);
            border: 2px solid rgba(212, 165, 116, 0.3);
            color: var(--text-cream);
            padding: 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
        }

        .season-btn:hover {
            background: rgba(45, 95, 63, 0.8);
            border-color: var(--accent-amber);
        }

        .season-btn.active {
            background: var(--leaf-green);
            border-color: var(--accent-amber);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.4);
        }

        .canvas-container {
            background: rgba(26, 58, 46, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid rgba(212, 165, 116, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            min-height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 2rem;
            overflow: hidden;
        }

        #forestCanvas {
            width: 100%;
            height: 700px;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .stats-overlay {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(26, 58, 46, 0.9);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 2px solid rgba(212, 165, 116, 0.4);
            font-size: 0.9rem;
            line-height: 1.8;
            min-width: 250px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 58, 46, 0.95);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(212, 165, 116, 0.3);
            border-top-color: var(--accent-amber);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }

        .loading-text {
            color: var(--accent-amber);
            font-size: 1.2rem;
            font-weight: 600;
            font-family: 'Crimson Pro', serif;
        }

        /* Tam Ekran Grafik Modalı */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease-out;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--forest-dark);
            border: 2px solid var(--accent-amber);
            border-radius: 20px;
            padding: 2rem;
            width: 98vw;
            height: 95vh;
            max-width: none;
            max-height: none;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: var(--accent-amber);
            border-bottom: 1px solid rgba(212, 165, 116, 0.2);
            padding-bottom: 0.5rem;
            flex-shrink: 0;
        }

        .modal-title {
            font-family: 'Crimson Pro', serif;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-cream);
            font-size: 2.5rem;
            cursor: pointer;
            line-height: 0.5;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: var(--accent-amber);
        }

        .chart-container {
            width: 100%;
            height: 100%;
            flex: 1;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            gap: 1.5rem;
            margin-bottom: 0.4rem;
        }

        .stat-item.highlight {
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(212, 165, 116, 0.3);
        }

        .stat-label {
            opacity: 0.8;
        }

        .stat-value {
            font-weight: 700;
            color: var(--accent-amber);
        }

        .real-time-value {
            color: #ff9999;
            font-size: 1.1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes treeGrow {
            from {
                transform: scaleY(0);
                opacity: 0;
            }
            to {
                transform: scaleY(1);
                opacity: 1;
            }
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-grid">
            <div class="controls-panel">
                <div class="control-group">
                    <label class="control-label">
                        Orman Büyüklüğü
                        <span class="value-display" id="areaValue">15 dönüm</span>
                    </label>
                    <div class="slider-container">
                        <input type="range" id="areaSlider" min="1" max="30" value="15" step="1">
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Mevsim Seçimi</label>
                    <div class="season-grid">
                        <button class="season-btn" data-season="ilkbahar" data-factor="1.0">İlkbahar</button>
                        <button class="season-btn active" data-season="yaz" data-factor="1.5">Yaz</button>
                        <button class="season-btn" data-season="sonbahar" data-factor="1.2">Sonbahar</button>
                        <button class="season-btn" data-season="kis" data-factor="0.3">Kış</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Arazi Geometrisi</label>
                    <div class="geometry-grid">
                        <button class="geometry-btn active" data-shape="square">
                            <span class="geometry-icon">■</span>
                            <span class="geo-name">Kare</span>
                        </button>
                        <button class="geometry-btn" data-shape="rectangle">
                            <span class="geometry-icon">▬</span>
                            <span class="geo-name">Dikdörtgen</span>
                        </button>
                        <button class="geometry-btn" data-shape="trapezoid">
                            <span class="geometry-icon">⏢</span>
                            <span class="geo-name">Yamuk</span>
                        </button>
                        <button class="geometry-btn" data-shape="parallelogram">
                            <span class="geometry-icon">▱</span>
                            <span class="geo-name">Paralelkenar</span>
                        </button>
                        <button class="geometry-btn" data-shape="triangle">
                            <span class="geometry-icon">▲</span>
                            <span class="geo-name">Üçgen</span>
                        </button>
                        <button class="geometry-btn" data-shape="triangle-right">
                            <span class="geometry-icon">◢</span>
                            <span class="geo-name">Dik Üçgen</span>
                        </button>
                        <button class="geometry-btn" data-shape="pentagon">
                            <span class="geometry-icon">⬟</span>
                            <span class="geo-name">Beşgen</span>
                        </button>
                        <button class="geometry-btn" data-shape="hexagon">
                            <span class="geometry-icon">⬡</span>
                            <span class="geo-name">Altıgen</span>
                        </button>
                        <button class="geometry-btn" data-shape="irregular-1">
                            <span class="geometry-icon">◈</span>
                            <span class="geo-name">Düzensiz 1</span>
                        </button>
                        <button class="geometry-btn" data-shape="irregular-2">
                            <span class="geometry-icon">◇</span>
                            <span class="geo-name">Düzensiz 2</span>
                        </button>
                         <button class="geometry-btn" data-shape="irregular-3">
                            <span class="geometry-icon">⎔</span>
                            <span class="geo-name">Düzensiz 3</span>
                        </button>
                        <button class="geometry-btn" data-shape="irregular-long">
                            <span class="geometry-icon">▯</span>
                            <span class="geo-name">Dar Uzun</span>
                        </button>
                        <button class="geometry-btn" data-shape="river-edge">
                            <span class="geometry-icon">≈</span>
                            <span class="geo-name">Nehir Kenarı</span>
                        </button>
                        <button class="geometry-btn" data-shape="circle">
                            <span class="geometry-icon">●</span>
                            <span class="geo-name">Daire</span>
                        </button>
                         <button class="geometry-btn" data-shape="ellipse">
                            <span class="geometry-icon">⬭</span>
                            <span class="geo-name">Elips</span>
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">
                        Ağaç Türleri
                        <span class="total-density" id="totalDensity">Toplam: 100%</span>
                    </label>
                    <div class="tree-species" id="treeSpecies"></div>
                </div>
            </div>

            <div class="canvas-container">
                <div class="top-controls">
                    <div class="wind-overlay" id="windOverlay">
                        <div class="wind-section">
                            <div class="wind-section-label">Rüzgar Yönü</div>
                            <div class="wind-compass" id="windCompass">
                                <div class="wind-arrow" id="windArrow">
                                    <svg width="50" height="70" viewBox="0 0 50 70">
                                        <circle cx="25" cy="12" r="10" fill="currentColor"/>
                                        <line x1="25" y1="22" x2="25" y2="55" stroke="currentColor" stroke-width="3"/>
                                        <polygon points="25,70 17,52 33,52" fill="currentColor"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <div class="wind-section">
                            <div class="wind-section-label">Rüzgar Şiddeti</div>
                            <div class="wind-speed-slider-container">
                                <input type="range" id="windSpeedSlider" min="0" max="10" value="5" step="1" orient="vertical">
                                <div class="wind-speed-value" id="windSpeedValue">5</div>
                            </div>
                        </div>
                        <div class="wind-section button-group">
                            <button class="generate-btn-top" id="generateBtnTop" style="display:none">Oluştur</button>
                            <button class="graph-btn" id="showGraphBtn" style="display: none;">
                                <span>📊</span> Grafik Göster
                            </button>
                        </div>
                    </div>
                </div>

                <canvas id="forestCanvas"></canvas>
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Yükleniyor, lütfen bekleyiniz...</div>
                </div>
                <div class="stats-overlay" id="statsOverlay" style="display: none;">
                    <div class="stat-item">
                        <span class="stat-label">Toplam Ağaç:</span>
                        <span class="stat-value" id="totalTrees">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Alan:</span>
                        <span class="stat-value" id="totalArea">0 m²</span>
                    </div>
                    <div class="stat-item highlight">
                        <span class="stat-label">Tahmini Süre:</span>
                        <span class="stat-value real-time-value" id="realWorldTime">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="graphModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Yangın Yayılma Analizi (Alan)</h3>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div class="chart-container">
                <canvas id="spreadChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const treeSpeciesData = [
            { id: 'ardic', name: 'Ardıç', color: '#5a9c6a', density: 0, burnFactor: 1.8 },
            { id: 'cam', name: 'Çam', color: '#1a5f1a', density: 0, burnFactor: 1.6 },
            { id: 'sedir', name: 'Sedir', color: '#3a7c52', density: 0, burnFactor: 1.4 },
            { id: 'ladin', name: 'Ladin', color: '#1e6b3e', density: 0, burnFactor: 1.3 },
            { id: 'göknar', name: 'Göknar', color: '#0d4d2d', density: 0, burnFactor: 1.3 },
            { id: 'meşe', name: 'Meşe', color: '#4a8c2a', density: 0, burnFactor: 1.0 },
            { id: 'kayın', name: 'Kayın', color: '#2d7a4f', density: 0, burnFactor: 0.6 },
            { id: 'kızılağaç', name: 'Kızılağaç', color: '#8b4513', density: 0, burnFactor: 0.4 }
        ];

        let state = {
            area: 15,
            geometry: 'square',
            selectedSpecies: [],
            speciesDensity: { cam: 0, meşe: 0, kızılağaç: 0, kayın: 0, göknar: 0, ladin: 0, sedir: 0, ardıç: 0 },
            windDirection: 0,
            windSpeed: 5,
            seasonFactor: 1.5 
        };

        let redDots = [];
        let spreadingAnimation = null;
        let redSpreadMap = new Map(); 
        let cleanForestSnapshot = null;
        let shapeBoundaryMap = new Float32Array(360); 
        
        let spreadData = []; 
        let calibratedPixelToMeterRatio = 1;

        function init() {
            setupEventListeners();
            renderSpeciesControls();
            updateSliderDisplays();
            setTimeout(generateForest, 200);
        }

        function setupEventListeners() {
            document.getElementById('areaSlider').addEventListener('input', (e) => {
                state.area = parseInt(e.target.value);
                updateSliderDisplays();
                generateForest();
            });

            document.getElementById('windCompass').addEventListener('click', (e) => {
                const compass = e.currentTarget;
                const rect = compass.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const clickX = e.clientX - centerX;
                const clickY = e.clientY - centerY;
                
                let angle = Math.atan2(clickY, clickX) * (180 / Math.PI);
                angle = (angle + 90 + 360) % 360;
                
                state.windDirection = Math.round(angle);
                updateWindDisplay();
            });

            document.getElementById('windSpeedSlider').addEventListener('input', (e) => {
                state.windSpeed = parseInt(e.target.value);
                updateSliderDisplays();
                generateForest(); 
            });

            document.querySelectorAll('.geometry-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.geometry-btn').forEach(b => b.classList.remove('active'));
                    const targetBtn = e.target.closest('.geometry-btn');
                    targetBtn.classList.add('active');
                    state.geometry = targetBtn.dataset.shape;
                    generateForest();
                });
            });

            document.querySelectorAll('.season-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    state.seasonFactor = parseFloat(e.target.dataset.factor);
                    generateForest();
                });
            });

            document.getElementById('forestCanvas').addEventListener('click', handleCanvasClick);
            document.getElementById('showGraphBtn').addEventListener('click', openGraphModal);
            document.getElementById('closeModal').addEventListener('click', closeGraphModal);
            document.getElementById('graphModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeGraphModal();
            });
        }

        function updateSliderDisplays() {
            document.getElementById('areaValue').textContent = state.area + ' dönüm';
            document.getElementById('windSpeedValue').textContent = state.windSpeed;
        }

        function updateWindDisplay() {
            const arrow = document.getElementById('windArrow');
            arrow.style.transform = `rotate(${state.windDirection + 180}deg)`;
        }

        function renderSpeciesControls() {
            const container = document.getElementById('treeSpecies');
            container.innerHTML = treeSpeciesData.map(species => `
                <div class="species-item">
                    <div class="species-header">
                        <input type="checkbox" class="species-checkbox" 
                               id="species-${species.id}" 
                               data-species="${species.id}"
                               ${state.selectedSpecies.includes(species.id) ? 'checked' : ''}>
                        <label for="species-${species.id}" class="species-name">${species.name}</label>
                    </div>
                    <div class="density-control">
                        <div class="density-label">Yoğunluk: <span id="density-value-${species.id}">${species.density}%</span></div>
                        <input type="range" class="density-slider" 
                               data-species="${species.id}"
                               min="0" max="100" value="${species.density}" step="10"
                               disabled>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.species-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const speciesId = e.target.dataset.species;
                    const slider = document.querySelector(`.density-slider[data-species="${speciesId}"]`);
                    
                    if (e.target.checked) {
                        if (!state.selectedSpecies.includes(speciesId)) {
                            state.selectedSpecies.push(speciesId);
                        }
                        slider.disabled = false;
                    } else {
                        state.selectedSpecies = state.selectedSpecies.filter(s => s !== speciesId);
                        slider.disabled = true;
                        state.speciesDensity[speciesId] = 0;
                        slider.value = 0;
                        document.getElementById(`density-value-${speciesId}`).textContent = '0%';
                    }
                    updateTotalDensityDisplay();
                    generateForest();
                });
            });

            document.querySelectorAll('.density-slider').forEach(slider => {
                slider.addEventListener('input', (e) => {
                    const speciesId = e.target.dataset.species;
                    const value = parseInt(e.target.value);
                    
                    let totalDensity = 0;
                    state.selectedSpecies.forEach(sp => {
                        if (sp === speciesId) {
                            totalDensity += value;
                        } else {
                            totalDensity += (state.speciesDensity[sp] || 0);
                        }
                    });

                    if (totalDensity > 100) {
                        e.target.value = state.speciesDensity[speciesId] || 0;
                        alert('Toplam yoğunluk %100\'ü geçemez! Lütfen diğer türlerin yoğunluğunu azaltın.');
                        updateTotalDensityDisplay();
                        return;
                    }

                    state.speciesDensity[speciesId] = value;
                    document.getElementById(`density-value-${speciesId}`).textContent = value + '%';
                    updateTotalDensityDisplay();
                    generateForest();
                });
            });

            updateTotalDensityDisplay();
        }

        function updateTotalDensityDisplay() {
            let totalDensity = 0;
            state.selectedSpecies.forEach(sp => {
                totalDensity += (state.speciesDensity[sp] || 0);
            });

            const totalDensityEl = document.getElementById('totalDensity');
            totalDensityEl.textContent = `Toplam: ${totalDensity}%`;
            
            if (totalDensity > 100) {
                totalDensityEl.classList.add('warning');
            } else {
                totalDensityEl.classList.remove('warning');
            }
        }

        async function generateForest() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.classList.add('active');
            document.getElementById('showGraphBtn').style.display = 'none';

            await new Promise(resolve => setTimeout(resolve, 50));

            if (spreadingAnimation) {
                cancelAnimationFrame(spreadingAnimation);
                spreadingAnimation = null;
            }

            const canvas = document.getElementById('forestCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.45;

            ctx.save();
            ctx.beginPath();
            createGeometryPath(ctx, centerX, centerY, scale);
            ctx.clip();

            // Zemin Rengi (Mat Açık Yeşil)
            const groundGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, scale);
            groundGradient.addColorStop(0, '#E8F5E9'); 
            groundGradient.addColorStop(1, '#81C784'); 
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const totalTrees = calculateTreeCount();

            const trees = [];
            const speciesColors = {};
            treeSpeciesData.forEach(s => speciesColors[s.id] = s.color);

            let attempts = 0;
            const maxAttempts = totalTrees * 3;
            
            const scaleFactor = Math.sqrt(15 / state.area); 
            const baseMinSize = 13; 
            const baseSizeRange = 12;
            
            // Eğer total ağaç sayısı 0 ise döngüye girme
            if (totalTrees > 0) {
                while (trees.length < totalTrees && attempts < maxAttempts) {
                    const x = centerX + (Math.random() - 0.5) * scale * 2;
                    const y = centerY + (Math.random() - 0.5) * scale * 2;
                    
                    if (isPointInShape(x, y, centerX, centerY, scale, state.geometry)) {
                        const species = selectRandomSpecies();
                        if (species) {
                            const treeSize = (baseMinSize + Math.random() * baseSizeRange) * scaleFactor;
                            trees.push({ x, y, size: treeSize, species, color: speciesColors[species], burnt: false });
                        }
                    }
                    attempts++;
                }
            }

            trees.forEach(tree => {
                drawTreeTopView(ctx, tree.x, tree.y, tree.size, tree.color, false);
            });

            window.currentTrees = trees;

            ctx.restore();

            ctx.strokeStyle = 'rgba(46, 125, 50, 0.8)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            createGeometryPath(ctx, centerX, centerY, scale);
            ctx.stroke();

            generateRedDots(centerX, centerY, scale);
            drawRedDots(ctx);

            cleanForestSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

            updateStats(trees.length);
            loadingOverlay.classList.remove('active');
        }

        function calculateShapePixelArea(centerX, centerY, scale) {
            const tCanvas = document.createElement('canvas');
            tCanvas.width = document.getElementById('forestCanvas').width;
            tCanvas.height = document.getElementById('forestCanvas').height;
            const tCtx = tCanvas.getContext('2d');

            tCtx.fillStyle = '#FFFFFF';
            tCtx.beginPath();
            createGeometryPath(tCtx, centerX, centerY, scale);
            tCtx.fill();

            const imgData = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height);
            const data = imgData.data;
            let pixelCount = 0;

            for (let i = 0; i < data.length; i += 4) {
                if (data[i+3] > 0) {
                    pixelCount++;
                }
            }
            return pixelCount;
        }

        function drawTreeTopView(ctx, x, y, size, color, isBurnt) {
            if (isBurnt) {
                ctx.fillStyle = '#222222';
                ctx.beginPath();
                ctx.arc(x, y, size * 0.4, 0, Math.PI * 2);
                ctx.fill();
                return;
            }

            const isConiferousColor = color === '#1a5f1a' || color === '#0d4d2d' || 
                                      color === '#1e6b3e' || color === '#3a7c52';
            
            if (isConiferousColor) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(x, y - size * 0.6);
                ctx.lineTo(x + size * 0.4, y);
                ctx.lineTo(x + size * 0.2, y + size * 0.6);
                ctx.lineTo(x - size * 0.2, y + size * 0.6);
                ctx.lineTo(x - size * 0.4, y);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.beginPath();
                ctx.arc(x + size * 0.1, y + size * 0.1, size * 0.4, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, size * 0.6, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = lightenColor(color, 20);
                for (let i = 0; i < 3; i++) {
                    const angle = (i * Math.PI * 2) / 3;
                    const offsetX = Math.cos(angle) * size * 0.3;
                    const offsetY = Math.sin(angle) * size * 0.3;
                    ctx.beginPath();
                    ctx.arc(x + offsetX, y + offsetY, size * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.beginPath();
                ctx.arc(x + size * 0.15, y + size * 0.15, size * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = '#4a3020';
            ctx.beginPath();
            ctx.arc(x, y, size * 0.08, 0, Math.PI * 2);
            ctx.fill();
        }

        function lightenColor(color, percent) {
            const num = parseInt(color.replace("#",""), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 +
                (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255))
                .toString(16).slice(1);
        }

        function createGeometryPath(ctx, centerX, centerY, scale) {
            switch(state.geometry) {
                case 'square':
                    ctx.rect(centerX - scale/2, centerY - scale/2, scale, scale);
                    break;
                case 'rectangle':
                    ctx.rect(centerX - scale*0.8, centerY - scale*0.5, scale*1.6, scale);
                    break;
                case 'circle':
                    ctx.arc(centerX, centerY, scale*0.7, 0, Math.PI * 2);
                    break;
                case 'triangle':
                    ctx.moveTo(centerX, centerY - scale*0.7);
                    ctx.lineTo(centerX - scale*0.7, centerY + scale*0.5);
                    ctx.lineTo(centerX + scale*0.7, centerY + scale*0.5);
                    ctx.closePath();
                    break;
                case 'triangle-right':
                    ctx.moveTo(centerX - scale*0.6, centerY - scale*0.6);
                    ctx.lineTo(centerX + scale*0.6, centerY + scale*0.6);
                    ctx.lineTo(centerX - scale*0.6, centerY + scale*0.6);
                    ctx.closePath();
                    break;
                case 'hexagon':
                    drawPolygon(ctx, centerX, centerY, 6, scale*0.7);
                    break;
                case 'pentagon':
                    drawPolygon(ctx, centerX, centerY, 5, scale*0.7);
                    break;
                case 'ellipse':
                    ctx.ellipse(centerX, centerY, scale*0.9, scale*0.5, 0, 0, Math.PI * 2);
                    break;
                case 'trapezoid':
                    ctx.moveTo(centerX - scale*0.5, centerY - scale*0.4);
                    ctx.lineTo(centerX + scale*0.5, centerY - scale*0.4);
                    ctx.lineTo(centerX + scale*0.8, centerY + scale*0.4);
                    ctx.lineTo(centerX - scale*0.8, centerY + scale*0.4);
                    ctx.closePath();
                    break;
                case 'parallelogram':
                    ctx.moveTo(centerX - scale*0.6, centerY - scale*0.4);
                    ctx.lineTo(centerX + scale*0.4, centerY - scale*0.4);
                    ctx.lineTo(centerX + scale*0.6, centerY + scale*0.4);
                    ctx.lineTo(centerX - scale*0.4, centerY + scale*0.4);
                    ctx.closePath();
                    break;
                // L ve U şekilleri tamamen kaldırıldı
                case 'irregular-1':
                    ctx.moveTo(centerX - scale*0.7, centerY - scale*0.6);
                    ctx.lineTo(centerX + scale*0.8, centerY - scale*0.3);
                    ctx.lineTo(centerX + scale*0.4, centerY + scale*0.8);
                    ctx.lineTo(centerX - scale*0.6, centerY + scale*0.5);
                    ctx.closePath();
                    break;
                case 'irregular-2':
                    ctx.moveTo(centerX - scale*0.5, centerY - scale*0.7);
                    ctx.lineTo(centerX + scale*0.6, centerY - scale*0.6);
                    ctx.lineTo(centerX + scale*0.8, centerY + scale*0.4);
                    ctx.lineTo(centerX, centerY + scale*0.8);
                    ctx.lineTo(centerX - scale*0.7, centerY + scale*0.2);
                    ctx.closePath();
                    break;
                case 'irregular-3':
                    ctx.moveTo(centerX - scale*0.6, centerY - scale*0.7);
                    ctx.lineTo(centerX + scale*0.5, centerY - scale*0.8);
                    ctx.lineTo(centerX + scale*0.8, centerY + scale*0.2);
                    ctx.lineTo(centerX + scale*0.3, centerY + scale*0.8);
                    ctx.lineTo(centerX - scale*0.5, centerY + scale*0.6);
                    ctx.lineTo(centerX - scale*0.8, centerY);
                    ctx.closePath();
                    break;
                case 'irregular-long':
                    ctx.moveTo(centerX - scale*0.4, centerY - scale*0.9);
                    ctx.lineTo(centerX + scale*0.3, centerY - scale*0.9);
                    ctx.lineTo(centerX + scale*0.5, centerY + scale*0.9);
                    ctx.lineTo(centerX - scale*0.3, centerY + scale*0.8);
                    ctx.closePath();
                    break;
                case 'river-edge':
                    ctx.moveTo(centerX - scale*0.8, centerY - scale*0.6);
                    ctx.lineTo(centerX + scale*0.8, centerY - scale*0.6);
                    ctx.bezierCurveTo(
                        centerX + scale*0.8, centerY + scale*0.2, 
                        centerX, centerY + scale*0.8, 
                        centerX - scale*0.8, centerY + scale*0.4
                    );
                    ctx.closePath();
                    break;
            }
        }

        function isPointInShape(x, y, centerX, centerY, scale, geometry) {
            switch(geometry) {
                case 'square':
                    return Math.abs(x - centerX) <= scale/2 && Math.abs(y - centerY) <= scale/2;
                case 'rectangle':
                    return Math.abs(x - centerX) <= scale*0.8 && Math.abs(y - centerY) <= scale*0.5;
                case 'circle':
                    const dist = Math.sqrt((x - centerX)**2 + (y - centerY)**2);
                    return dist <= scale*0.7;
                case 'ellipse':
                    const dx = (x - centerX) / (scale*0.9);
                    const dy = (y - centerY) / (scale*0.5);
                    return (dx*dx + dy*dy) <= 1;
                default:
                    const tempCanvas = document.createElement('canvas');
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCtx.beginPath();
                    createGeometryPath(tempCtx, centerX, centerY, scale);
                    return tempCtx.isPointInPath(x, y);
            }
        }

        function drawPolygon(ctx, x, y, sides, radius) {
            const angle = (Math.PI * 2) / sides;
            ctx.moveTo(x + radius * Math.cos(0), y + radius * Math.sin(0));
            for (let i = 1; i <= sides; i++) {
                ctx.lineTo(x + radius * Math.cos(angle * i), y + radius * Math.sin(angle * i));
            }
            ctx.closePath();
        }

        function calculateTreeCount() {
            const treesPerDonum = 85; 
            const maxTrees = state.area * treesPerDonum;
            
            let totalDensity = 0;
            state.selectedSpecies.forEach(sp => {
                totalDensity += (state.speciesDensity[sp] || 0);
            });
            
            if (state.selectedSpecies.length === 0 || totalDensity === 0) {
                return 0;
            }
            
            return Math.floor(maxTrees * (totalDensity / 100));
        }

        function selectRandomSpecies() {
            if (state.selectedSpecies.length === 0) return null;
            
            const activeSpecies = state.selectedSpecies.filter(sp => 
                (state.speciesDensity[sp] || 0) > 0
            );
            
            if (activeSpecies.length === 0) return null;
            
            const weights = activeSpecies.map(sp => state.speciesDensity[sp] || 0);
            const totalWeight = weights.reduce((a, b) => a + b, 0);
            
            if (totalWeight === 0) return null;
            
            let random = Math.random() * totalWeight;
            
            for (let i = 0; i < activeSpecies.length; i++) {
                random -= weights[i];
                if (random <= 0) {
                    return activeSpecies[i];
                }
            }
            
            return activeSpecies[0];
        }

        function updateStats(treeCount) {
            document.getElementById('statsOverlay').style.display = 'block';
            document.getElementById('totalTrees').textContent = treeCount;
            document.getElementById('totalArea').textContent = (state.area * 1000).toLocaleString('tr-TR') + ' m²';
            document.getElementById('realWorldTime').textContent = '-';
        }

        function generateRedDots(centerX, centerY, scale) {
            redDots = [];
            redSpreadMap.clear();
            spreadData = [];
            
            if (spreadingAnimation) {
                cancelAnimationFrame(spreadingAnimation);
                spreadingAnimation = null;
            }

            // Sadece ağaç varsa nokta koy (yangın başlatmak için)
            if (!window.currentTrees || window.currentTrees.length === 0) return;

            let attempts = 0;
            const maxAttempts = 1000;
            const minDistance = scale * 0.15;

            while (redDots.length < 30 && attempts < maxAttempts) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * scale * 0.65;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                if (isPointInShape(x, y, centerX, centerY, scale, state.geometry)) {
                    let tooClose = false;
                    for (let dot of redDots) {
                        const dist = Math.sqrt((x - dot.x) ** 2 + (y - dot.y) ** 2);
                        if (dist < minDistance) {
                            tooClose = true;
                            break;
                        }
                    }

                    if (!tooClose) {
                        redDots.push({ x, y, clicked: false });
                    }
                }
                attempts++;
            }

            while (redDots.length < 30 && attempts < maxAttempts * 2) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * scale * 0.65;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                if (isPointInShape(x, y, centerX, centerY, scale, state.geometry)) {
                    redDots.push({ x, y, clicked: false });
                }
                attempts++;
            }
        }

        function drawRedDots(ctx) {
            redDots.forEach(dot => {
                ctx.fillStyle = dot.clicked ? '#ff0000' : '#ff0000';
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, 6, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        function handleCanvasClick(e) {
            // SIFIR AĞAÇ KONTROLÜ (GÜNCELLENMİŞ)
            if (!window.currentTrees || window.currentTrees.length === 0) {
                alert("Lütfen simülasyonu başlatmak için en az bir ağaç türü seçin.");
                return;
            }

            const canvas = document.getElementById('forestCanvas');
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            for (let i = 0; i < redDots.length; i++) {
                const dot = redDots[i];
                const dist = Math.sqrt((x - dot.x) ** 2 + (y - dot.y) ** 2);
                
                if (dist <= 15) {
                    startRedSpread(dot.x, dot.y);
                    break;
                }
            }
        }

        function formatRealTime(minutes) {
            const hrs = Math.floor(minutes / 60);
            const mins = Math.floor(minutes % 60);
            if (hrs > 0) {
                return `${hrs} saat ${mins} dakika`;
            } else {
                return `${mins} dakika`;
            }
        }

        function openGraphModal() {
            document.getElementById('graphModal').classList.add('active');
            requestAnimationFrame(drawChart);
        }

        function closeGraphModal() {
            document.getElementById('graphModal').classList.remove('active');
        }

        function drawChart() {
            const canvas = document.getElementById('spreadChart');
            const container = document.querySelector('.chart-container');
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;

            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            if (spreadData.length < 2) {
                ctx.fillStyle = '#d4a574';
                ctx.font = '24px "Crimson Pro"';
                ctx.textAlign = 'center';
                ctx.fillText('Henüz veri yok. Simülasyonu başlatın.', width/2, height/2);
                return;
            }

            const paddingLeft = 80;
            const paddingBottom = 60;
            const paddingTop = 40;
            const paddingRight = 40;
            
            const graphWidth = width - paddingLeft - paddingRight;
            const graphHeight = height - paddingTop - paddingBottom;

            const maxTime = spreadData[spreadData.length-1].t;
            const maxArea = spreadData[spreadData.length-1].a;

            const xScale = graphWidth / maxTime;
            const yScale = graphHeight / maxArea;

            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 1;
            
            const timeSteps = 10;
            for(let i=0; i<=timeSteps; i++) {
                const x = paddingLeft + (graphWidth * i / timeSteps);
                ctx.moveTo(x, paddingTop);
                ctx.lineTo(x, height - paddingBottom);
                
                const val = (maxTime * i / timeSteps).toFixed(0);
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '12px "DM Sans"';
                ctx.textAlign = 'center';
                ctx.fillText(val, x, height - paddingBottom + 20);
            }
            
            const areaSteps = 8;
            ctx.textAlign = 'right';
            for(let i=0; i<=areaSteps; i++) {
                const y = paddingTop + (graphHeight * i / areaSteps);
                ctx.moveTo(paddingLeft, y);
                ctx.lineTo(width - paddingRight, y);
                
                const val = maxArea - (maxArea * i / areaSteps);
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.fillText(Math.round(val).toLocaleString(), paddingLeft - 10, y + 4);
            }
            ctx.stroke();

            ctx.beginPath();
            ctx.strokeStyle = 'rgba(212, 165, 116, 0.5)';
            ctx.lineWidth = 2;
            ctx.moveTo(paddingLeft, paddingTop);
            ctx.lineTo(paddingLeft, height - paddingBottom);
            ctx.lineTo(width - paddingRight, height - paddingBottom);
            ctx.stroke();

            ctx.fillStyle = '#d4a574';
            ctx.font = 'bold 18px "DM Sans"';
            ctx.textAlign = 'center';
            ctx.fillText('Zaman (dk)', paddingLeft + graphWidth/2, height - 15);
            
            ctx.save();
            ctx.translate(25, paddingTop + graphHeight/2);
            ctx.rotate(-Math.PI/2);
            ctx.textAlign = 'center';
            ctx.fillText('Yanan Alan (m²)', 0, 0);
            ctx.restore();

            ctx.beginPath();
            ctx.strokeStyle = '#ff4444';
            ctx.lineWidth = 4;
            ctx.lineJoin = 'round';
            
            spreadData.forEach((point, i) => {
                const x = paddingLeft + point.t * xScale;
                const y = (height - paddingBottom) - (point.a * yScale);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            const lastX = paddingLeft + spreadData[spreadData.length-1].t * xScale;
            ctx.lineTo(lastX, height - paddingBottom);
            ctx.lineTo(paddingLeft, height - paddingBottom);
            ctx.closePath();
            const gradient = ctx.createLinearGradient(0, paddingTop, 0, height - paddingBottom);
            gradient.addColorStop(0, 'rgba(255, 68, 68, 0.4)');
            gradient.addColorStop(1, 'rgba(255, 68, 68, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        function startRedSpread(startX, startY) {
            if (spreadingAnimation) {
                cancelAnimationFrame(spreadingAnimation);
            }

            document.getElementById('showGraphBtn').style.display = 'flex';
            spreadData = [];

            const startTime = performance.now();
            document.getElementById('realWorldTime').textContent = 'Hesaplanıyor...';

            const canvas = document.getElementById('forestCanvas');
            const ctx = canvas.getContext('2d');
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.45;

            const shapePixelCount = calculateShapePixelArea(centerX, centerY, scale);
            const targetRealAreaM2 = state.area * 1000;
            calibratedPixelToMeterRatio = Math.sqrt(targetRealAreaM2 / shapePixelCount);

            const fireBoundaryMap = new Float32Array(360);
            const tempCtx = document.createElement('canvas').getContext('2d');
            tempCtx.canvas.width = canvas.width;
            tempCtx.canvas.height = canvas.height;
            tempCtx.beginPath();
            createGeometryPath(tempCtx, centerX, centerY, scale);
            
            const maxScanDist = Math.max(canvas.width, canvas.height);
            for(let a = 0; a < 360; a++) {
                const rad = (a * Math.PI) / 180;
                let r = 0;
                while(r < maxScanDist) {
                    const tx = startX + Math.cos(rad) * r;
                    const ty = startY + Math.sin(rad) * r;
                    
                    if(!tempCtx.isPointInPath(tx, ty) && r > 50) {
                        break;
                    }
                    r += 4;
                }
                fireBoundaryMap[a] = r;
            }

            const radiusPerDirection = new Array(360).fill(0);
            const baseSpeed = 4.0 * (5 / state.area); 
            const windAngleRad = (state.windDirection * Math.PI) / 180;
            const windIntensity = state.windSpeed / 10; 
            let lastDataTime = 0;

            function animate() {
                const elapsedTime = (performance.now() - startTime) / 1000;

                if (cleanForestSnapshot) {
                    ctx.putImageData(cleanForestSnapshot, 0, 0);
                }

                let activeSpreading = false;

                let totalBurnFactor = 0;
                let totalDensity = 0;
                state.selectedSpecies.forEach(sp => {
                    const density = state.speciesDensity[sp] || 0;
                    if (density > 0) {
                        const speciesInfo = treeSpeciesData.find(t => t.id === sp);
                        if (speciesInfo) {
                            totalBurnFactor += speciesInfo.burnFactor * density;
                            totalDensity += density;
                        }
                    }
                });
                
                const forestBurnMultiplier = totalDensity > 0 ? (totalBurnFactor / totalDensity) : 1.0;

                for (let angle = 0; angle < 360; angle++) {
                    const angleRad = (angle * Math.PI) / 180;
                    const spreadDirX = Math.cos(angleRad);
                    const spreadDirY = Math.sin(angleRad);
                    
                    const canvasWindAngle = windAngleRad - (Math.PI / 2);
                    const windDirX = Math.cos(canvasWindAngle);
                    const windDirY = Math.sin(canvasWindAngle); 
                    
                    const alignment = spreadDirX * windDirX + spreadDirY * windDirY;
                    let windMultiplier = 1;
                    
                    if (alignment > 0) {
                        windMultiplier = 1 + (alignment * windIntensity * 12);
                    } else {
                        windMultiplier = 1 + (alignment * windIntensity * 0.9);
                    }
                    windMultiplier = Math.max(0.1, windMultiplier);
                    
                    const limit = fireBoundaryMap[angle];
                    
                    if (radiusPerDirection[angle] < limit) {
                        radiusPerDirection[angle] += baseSpeed * windMultiplier * forestBurnMultiplier * state.seasonFactor;
                        if(radiusPerDirection[angle] > limit) radiusPerDirection[angle] = limit;
                        activeSpreading = true;
                    }
                }
                
                const calculatedHours = (elapsedTime * 40) / 60;
                const totalMinutes = calculatedHours * 60;
                document.getElementById('realWorldTime').textContent = formatRealTime(totalMinutes);

                if (elapsedTime - lastDataTime > 0.1) {
                    const dTheta = (Math.PI * 2) / 360;
                    let currentAreaPixels = 0;
                    for(let r of radiusPerDirection) {
                        currentAreaPixels += 0.5 * r * r * dTheta;
                    }
                    
                    const currentAreaM2 = currentAreaPixels * (calibratedPixelToMeterRatio * calibratedPixelToMeterRatio);

                    spreadData.push({
                        t: totalMinutes, 
                        a: currentAreaM2 
                    });
                    lastDataTime = elapsedTime;
                }

                if (window.currentTrees) {
                    window.currentTrees.forEach(tree => {
                        if (tree.burnt) {
                            drawTreeTopView(ctx, tree.x, tree.y, tree.size, tree.color, true);
                        } else {
                            const dx = tree.x - startX;
                            const dy = tree.y - startY;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            let angleToTree = Math.atan2(dy, dx) * (180 / Math.PI);
                            if (angleToTree < 0) angleToTree += 360;
                            
                            const index = Math.floor(angleToTree) % 360;
                            if (dist < radiusPerDirection[index] * 0.9) {
                                tree.burnt = true;
                                drawTreeTopView(ctx, tree.x, tree.y, tree.size, tree.color, true);
                            }
                        }
                    });
                }

                ctx.save();
                ctx.beginPath();
                createGeometryPath(ctx, centerX, centerY, scale);
                ctx.clip();

                const fireGradient = ctx.createRadialGradient(startX, startY, 0, startX, startY, Math.max(...radiusPerDirection));
                fireGradient.addColorStop(0, 'rgba(255, 200, 50, 0.8)');
                fireGradient.addColorStop(0.6, 'rgba(255, 69, 0, 0.6)');
                fireGradient.addColorStop(1, 'rgba(139, 0, 0, 0)');

                ctx.fillStyle = fireGradient;
                ctx.beginPath();
                
                for (let angle = 0; angle < 360; angle += 2) {
                    const angleRad = (angle * Math.PI) / 180;
                    const noise = Math.sin(elapsedTime * 10 + angle * 0.1) * 5 + Math.random() * 5;
                    const radius = Math.min(fireBoundaryMap[angle], radiusPerDirection[angle] + noise);
                    
                    const x = startX + Math.cos(angleRad) * radius;
                    const y = startY + Math.sin(angleRad) * radius;
                    
                    if (angle === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                drawRedDots(ctx);

                if (activeSpreading) {
                    spreadingAnimation = requestAnimationFrame(animate);
                } else {
                    // Bitti
                }
            }

            animate();
        }

        init();
    </script>
